name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.23.1"

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          package_manager="$(node -p 'require("./package.json").packageManager')"
          expected_version="${package_manager#pnpm@}"
          expected_version="${expected_version%%+*}"
          corepack prepare "$package_manager" --activate
          actual_version="$(pnpm --version)"
          test "$actual_version" = "$expected_version" || {
            echo "::error::Expected pnpm $expected_version, got $actual_version"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check commit messages
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          range_start="$BASE_SHA"
          if ! git cat-file -e "${range_start}:commitlint.config.mjs" 2>/dev/null; then
            bootstrap_commit="$(
              git rev-list --reverse "${range_start}..${HEAD_SHA}" -- commitlint.config.mjs |
                head -n 1
            )"
            test -n "$bootstrap_commit" || {
              echo "::error::Could not locate the commitlint bootstrap commit"
              exit 1
            }
            range_start="${bootstrap_commit}^"
          fi
          pnpm exec commitlint --from "$range_start" --to "$HEAD_SHA" --verbose

      - name: Check
        run: make check

      - name: Build
        run: make build

      - name: Node tests
        run: make test-node
