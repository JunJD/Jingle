name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      channel: ${{ steps.release-tag.outputs.channel }}
      version: ${{ steps.release-tag.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release tag
        id: release-tag
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            channel="stable"
            version="${BASH_REMATCH[1]}"
            prerelease="false"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9]{8}(\.[0-9]+)?)$ ]]; then
            channel="nightly"
            version="${BASH_REMATCH[1]}"
            prerelease="true"
          else
            echo "::error::Unsupported release tag '$tag'. Use vX.Y.Z for stable or vX.Y.Z-nightly.YYYYMMDD[.N] for nightly."
            exit 1
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
            exit 0
          fi

          args=(--verify-tag --draft --title "Jingle $GITHUB_REF_NAME" --notes "")
          if [[ "${{ steps.release-tag.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" "${args[@]}"

  package:
    name: Package ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac
            runner: macos-latest
            command: pnpm run dist:mac
          - name: windows
            runner: windows-latest
            command: pnpm run dist:win
          - name: linux
            runner: ubuntu-latest
            command: pnpm run dist:linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        shell: bash
        run: |
          npm install --global --force corepack@latest
          corepack enable
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          npm version "${{ needs.prepare-release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package desktop app
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          )

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found in dist." >&2
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
