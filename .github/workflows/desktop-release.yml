name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      channel: ${{ steps.release-tag.outputs.channel }}
      version: ${{ steps.release-tag.outputs.version }}

    steps:
      - name: Validate release tag
        id: release-tag
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            channel="stable"
            version="${BASH_REMATCH[1]}"
            prerelease="false"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9]{8}(\.[0-9]+)?)$ ]]; then
            channel="nightly"
            version="${BASH_REMATCH[1]}"
            prerelease="true"
          else
            echo "::error::Unsupported release tag '$tag'. Use vX.Y.Z for stable or vX.Y.Z-nightly.YYYYMMDD[.N] for nightly."
            exit 1
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
            exit 0
          fi

          args=(--verify-tag --draft --title "Jingle $GITHUB_REF_NAME" --notes "")
          if [[ "${{ steps.release-tag.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" "${args[@]}"

  package:
    name: Package ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac
            runner: macos-latest
            command: pnpm run dist:mac
          - name: windows
            runner: windows-latest
            command: pnpm run dist:win
          - name: linux
            runner: ubuntu-latest
            command: pnpm run dist:linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.23.1"

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          package_manager="$(node -p 'require("./package.json").packageManager')"
          expected_version="${package_manager#pnpm@}"
          expected_version="${expected_version%%+*}"
          corepack prepare "$package_manager" --activate
          actual_version="$(pnpm --version)"
          test "$actual_version" = "$expected_version" || {
            echo "::error::Expected pnpm $expected_version, got $actual_version"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          npm version "${{ needs.prepare-release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Audit frontend package declarations
        run: pnpm run audit:frontend-packages

      - name: Package desktop app
        run: ${{ matrix.command }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  # TODO(#108): Require macOS notarization, Windows Authenticode verification,
  # and provenance checks here before treating a stable release as publishable.
  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate and verify checksums
        shell: bash
        run: |
          cd release-assets
          rm -f SHA256SUMS.txt
          shopt -s nullglob
          export LC_ALL=C
          assets=(*)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No packaged assets were downloaded."
            exit 1
          fi
          sha256sum "${assets[@]}" > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No packaged assets were downloaded."
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
