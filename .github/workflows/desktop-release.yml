name: Desktop Release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
            exit 0
          fi

          args=(--verify-tag --draft --title "$GITHUB_REF_NAME" --notes "")
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" "${args[@]}"

  package:
    name: Package ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac
            runner: macos-latest
            command: pnpm run dist:mac
          - name: windows
            runner: windows-latest
            command: pnpm run dist:win
          - name: linux
            runner: ubuntu-latest
            command: pnpm run dist:linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        shell: bash
        run: |
          npm install --global --force corepack@latest
          corepack enable
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#app-v}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package desktop app
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          )

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found in dist." >&2
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
