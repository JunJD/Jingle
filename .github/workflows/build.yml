name: Build

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete previous build artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[] | select(.name | startswith("jingle-")) | .id' |
            while IFS= read -r artifact_id; do
              gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id"
            done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        shell: bash
        run: |
          npm install --global --force corepack@latest
          corepack enable
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: jingle-${{ matrix.platform }}-out
          path: out
          retention-days: 1
          if-no-files-found: error
