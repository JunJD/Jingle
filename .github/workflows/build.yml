name: Build

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.23.1"

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          package_manager="$(node -p 'require("./package.json").packageManager')"
          expected_version="${package_manager#pnpm@}"
          expected_version="${expected_version%%+*}"
          corepack prepare "$package_manager" --activate
          actual_version="$(pnpm --version)"
          test "$actual_version" = "$expected_version" || {
            echo "::error::Expected pnpm $expected_version, got $actual_version"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit frontend package declarations
        run: pnpm run audit:frontend-packages

      - name: Build Electron app
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jingle-${{ matrix.platform }}-out
          path: out
          retention-days: 1
          if-no-files-found: error
          overwrite: true
