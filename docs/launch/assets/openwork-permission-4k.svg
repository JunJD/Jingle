<text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="1494" y="802">需要审批</text><text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="1494" y="852">创建、修改、删除</text><text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="1494" y="902">执行前把决定权交回人</text>
