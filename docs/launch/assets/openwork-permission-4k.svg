    <text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="118" font-weight="850" fill="#f5f7fa" text-anchor="start" x="220" y="220">能力给 Agent，用权限收住</text>
    <text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="54" font-weight="500" fill="#a7b0be" text-anchor="start" x="226" y="380">人可以自然操作；Agent 只能调用受控工具。</text>
    <rect fill="#171c24" height="500" rx="42" stroke="#3ddc97" stroke-width="2" width="960" x="260" y="670"></rect>
