<text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="314" y="802">默认可用</text><text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="314" y="852">读取信息、搜索、查看状态</text><text dominant-baseline="hanging" font-family="Inter, SF Pro Display, PingFang SC, Arial, sans-serif" font-size="36" font-weight="450" fill="#a7b0be" text-anchor="start" x="314" y="902">不改变外部世界</text>
